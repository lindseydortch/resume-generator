<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resume Editor</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💼</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --border: #e4e2dd;
    --accent: #1a1a1a;
    --resume-accent: #1a1a1a;
    --resume-accent-2: #444444;
    --resume-font: 'Georgia', serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--ink);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  header h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  header h1 span { color: var(--muted); font-weight: 400; }

  .controls {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--muted);
  }

  .control-group input[type="color"] {
    width: 28px;
    height: 28px;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    padding: 0;
    background: none;
  }

  .control-group select {
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 8px;
    font-size: 13px;
    background: var(--surface);
    cursor: pointer;
  }

  button {
    border: none;
    background: var(--ink);
    color: white;
    padding: 8px 14px;
    border-radius: 5px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }

  button.secondary {
    background: var(--surface);
    color: var(--ink);
    border: 1px solid var(--border);
  }

  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    flex: 1;
    overflow: hidden;
  }

  .pane {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .pane-header {
    padding: 8px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .editor-pane { border-right: 1px solid var(--border); }

  #editor {
    flex: 1;
    border: none;
    outline: none;
    padding: 24px;
    font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
    font-size: 13px;
    line-height: 1.6;
    resize: none;
    background: var(--surface);
    color: var(--ink);
  }

  .preview-pane { background: #ececec; overflow: auto; }

  .preview-scroll {
    padding: 24px;
    display: flex;
    justify-content: center;
  }

  /* Resume preview — sized like a real US Letter page */
  #preview {
    width: 8.5in;
    min-height: 11in;
    padding: 0.55in 0.65in;
    background: white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.06);
    font-family: var(--resume-font);
    color: #111;
    font-size: 10.5pt;
    line-height: 1.4;
  }

  /* # Name */
  #preview h1 {
    margin: 0 0 2px;
    font-size: 24pt;
    font-weight: 700;
    color: var(--resume-accent);
    letter-spacing: -0.01em;
    line-height: 1.1;
  }

  /* ## Subtitle (job title under name) */
  #preview h2 {
    margin: 0 0 6px;
    font-size: 12pt;
    font-weight: 500;
    color: #444;
    letter-spacing: 0.01em;
  }

  /* ### Section headers (Executive Summary, Experience, etc.) — BRAND COLOR */
  #preview h3 {
    margin: 16px 0 6px;
    font-size: 11pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--resume-accent);
    border-bottom: 1.5px solid var(--resume-accent);
    padding-bottom: 3px;
  }

  /* #### Job/School entries — SECONDARY ACCENT */
  #preview h4 {
    margin: 10px 0 2px;
    font-size: 10.5pt;
    font-weight: 700;
    color: var(--resume-accent-2);
  }

  #preview p { margin: 4px 0; }
  #preview ul { margin: 4px 0 8px; padding-left: 18px; }
  #preview li { margin: 2px 0; }
  /* Bold labels like "Languages:", "Frameworks & Libraries:" — SECONDARY ACCENT */
  #preview strong { color: var(--resume-accent-2); }
  #preview a { color: var(--resume-accent); text-decoration: none; }
  #preview hr {
    border: none;
    border-top: 1px solid #ddd;
    margin: 8px 0;
  }

  /* Contact line: first paragraph after the subtitle */
  #preview h2 + p {
    color: #555;
    font-size: 9.5pt;
    margin: 2px 0 0;
  }

  .help {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 8px 16px;
    font-size: 12px;
    color: var(--muted);
  }
  .help kbd {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 11px;
    font-family: inherit;
  }
</style>
</head>
<body>

<header>
  <h1>Resume Editor <span>· markdown → pdf</span></h1>
  <div class="controls">
    <div class="control-group">
      <label for="accent">Primary</label>
      <input type="color" id="accent" value="#1a1a1a">
    </div>
    <div class="control-group">
      <label for="accent2">Secondary</label>
      <input type="color" id="accent2" value="#444444">
    </div>
    <div class="control-group">
      <label for="font">Font</label>
      <select id="font">
        <option value="'Georgia', serif">Georgia</option>
        <option value="'Times New Roman', serif">Times New Roman</option>
        <option value="'Garamond', serif">Garamond</option>
        <option value="'Helvetica Neue', Helvetica, sans-serif">Helvetica</option>
        <option value="'Calibri', sans-serif">Calibri</option>
        <option value="'Lato', sans-serif">Lato</option>
        <option value="'Source Sans Pro', sans-serif">Source Sans Pro</option>
        <option value="'EB Garamond', serif">EB Garamond</option>
      </select>
    </div>
    <button class="secondary" id="loadSample">Reload resume</button>
    <button class="secondary" id="clear">Clear</button>
    <button id="download">Download PDF</button>
  </div>
</header>

<main>
  <section class="pane editor-pane">
    <div class="pane-header">Markdown</div>
    <textarea id="editor" spellcheck="false" placeholder="Paste or type your resume markdown here..."></textarea>
  </section>
  <section class="pane preview-pane">
    <div class="pane-header">Preview</div>
    <div class="preview-scroll">
      <div id="preview"></div>
    </div>
  </section>
</main>

<div class="help">
  Saved automatically in your browser. <kbd># Name</kbd> · <kbd>## Title</kbd> · <kbd>### Section</kbd> · <kbd>#### Job entry</kbd> · <kbd>- bullet</kbd>. Delete any bullet you don't want before exporting.
</div>

<script>
const sample = `
# John Doe
## Senior Full Stack Software Engineer in Dallas, Texas
Email: johndoe@gmail.com | Phone: 555-555-5555 | [LinkedIn](#) | [GitHub](#) | [Portfolio](x)

### Executive Summary
I'm baby you probably haven't heard of them mushroom coffee brainrot supper club, cliche imposter syndrome le corbusier orange wine tumblr kombucha buy nothing craft beer listicle lorde man braid. Tofu pabst nepo baby, van life freire big mood dirtbag cloud bread deschooling tbh deep v decolonize pickleback ramps. 

### Technical Skills 
**Languages**: HTML | CSS | JavaScript | TypeScript | Python | SQL | GraphQL
**Frameworks & Libraries**: React | Next.js | Angular | Node.js | Express | GatsbyJS | React Native | Styled Components | Tailwind
**Databaes**: PostgreSQL | MongoDB
**Tools**: Git | Figma | Mongoose | Prisma

### Experience 
#### Company | Title | Month 20xx - Month 20xx
- Portland gluten-free jean shorts bouldering sriracha bode claire saffitz Brooklyn lion's mane risograph dream pop varda furikake.
- Nineties zizek crucifix, harissa twee needle felting lomo tufting bespoke omakase v60. 
- Pinterest nose to tail solarpunk kettlebell migas gatekeep godard lo-fi, doomscroll edison bulb jacobin intermittent fasting jade roller abolition jianbing. 
- Four loko gawker deadlift, knausgaard kitsch +1 zines. Mitski compost polycule ceramics man braid cahiers seitan taiyaki. 
- Cold-pressed kombucha shabby chic coastal grandma, sohla el-waylly readymade carhartt cupping same freegan bushwick decolonize lockwood listicle.

#### Company | Title | Month 20xx - Month 20xx
- Portland gluten-free jean shorts bouldering sriracha bode claire saffitz Brooklyn lion's mane risograph dream pop varda furikake.
- Nineties zizek crucifix, harissa twee needle felting lomo tufting bespoke omakase v60. 
- Pinterest nose to tail solarpunk kettlebell migas gatekeep godard lo-fi, doomscroll edison bulb jacobin intermittent fasting jade roller abolition jianbing. 
- Four loko gawker deadlift, knausgaard kitsch +1 zines. Mitski compost polycule ceramics man braid cahiers seitan taiyaki. 
- Cold-pressed kombucha shabby chic coastal grandma, sohla el-waylly readymade carhartt cupping same freegan bushwick decolonize lockwood listicle.

#### Company | Title | Month 20xx - Month 20xx
- Portland gluten-free jean shorts bouldering sriracha bode claire saffitz Brooklyn lion's mane risograph dream pop varda furikake.
- Nineties zizek crucifix, harissa twee needle felting lomo tufting bespoke omakase v60. 
- Pinterest nose to tail solarpunk kettlebell migas gatekeep godard lo-fi, doomscroll edison bulb jacobin intermittent fasting jade roller abolition jianbing. 
- Four loko gawker deadlift, knausgaard kitsch +1 zines. Mitski compost polycule ceramics man braid cahiers seitan taiyaki. 
- Cold-pressed kombucha shabby chic coastal grandma, sohla el-waylly readymade carhartt cupping same freegan bushwick decolonize lockwood listicle.

### Education 
#### Univeristy of XYZ | Bachelors In XYZ 
`;

const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const accentInput = document.getElementById('accent');
const accent2Input = document.getElementById('accent2');
const fontSelect = document.getElementById('font');

// In-memory state only — no browser storage used.
let state = {
  markdown: '',
  accent: '#1a1a1a',
  accent2: '#444444',
  font: "'Georgia', serif"
};

function render() {
  preview.innerHTML = marked.parse(editor.value || '', { breaks: true });
}

function applyTheme() {
  document.documentElement.style.setProperty('--resume-accent', state.accent);
  document.documentElement.style.setProperty('--resume-accent-2', state.accent2);
  document.documentElement.style.setProperty('--resume-font', state.font);
}

editor.addEventListener('input', () => {
  state.markdown = editor.value;
  render();
});

accentInput.addEventListener('input', (e) => {
  state.accent = e.target.value;
  applyTheme();
});

accent2Input.addEventListener('input', (e) => {
  state.accent2 = e.target.value;
  applyTheme();
});

fontSelect.addEventListener('change', (e) => {
  state.font = e.target.value;
  applyTheme();
});

document.getElementById('loadSample').addEventListener('click', () => {
  if (editor.value && !confirm('Replace current content with the original resume?')) return;
  editor.value = sample;
  state.markdown = sample;
  render();
});

document.getElementById('clear').addEventListener('click', () => {
  if (!confirm('Clear the editor?')) return;
  editor.value = '';
  state.markdown = '';
  render();
});

document.getElementById('download').addEventListener('click', () => {
  const nameMatch = (editor.value.match(/^#\s+(.+)$/m) || [])[1] || 'resume';
  const filename = nameMatch.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') + '.pdf';

  const opts = {
    margin: 0,
    filename,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
  };

  html2pdf().set(opts).from(preview).save();
});

// Initial state
editor.value = sample;
state.markdown = sample;
applyTheme();
render();
</script>

</body>
</html>
